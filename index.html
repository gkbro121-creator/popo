<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="movieXnow - a responsive movie viewing website template with DoodStream embed support." />
  <title>movieXnow</title>
  <style>
    :root {
      --orange: #ff7a00;
      --orange-2: #ff9b35;
      --bg: #0b0b0d;
      --surface: #151519;
      --surface-2: #202026;
      --text: #ffffff;
      --muted: #b7b7c4;
      --border: rgba(255, 122, 0, 0.42);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      --radius: 16px;
    }

    [data-theme="light"] {
      --bg: #f7f7fb;
      --surface: #ffffff;
      --surface-2: #efeff5;
      --text: #111114;
      --muted: #5d5d6a;
      --border: rgba(255, 122, 0, 0.48);
      --shadow: 0 18px 50px rgba(16, 16, 24, 0.12);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }
    button, input, textarea, select { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }
    .hidden { display: none !important; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 60;
      display: grid;
      grid-template-columns: auto minmax(220px, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 12px clamp(12px, 2.4vw, 32px);
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      text-decoration: none;
      font-size: clamp(20px, 2vw, 28px);
      font-weight: 900;
      letter-spacing: -0.8px;
      white-space: nowrap;
    }
    .brand-icon {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--orange);
      color: #fff;
      box-shadow: 0 8px 24px rgba(255, 122, 0, 0.32);
      font-size: 18px;
    }
    .brand strong { color: var(--orange); }

    .search {
      display: grid;
      grid-template-columns: 1fr auto;
      width: min(760px, 100%);
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      background: var(--surface);
    }
    .search input {
      min-width: 0;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      padding: 12px 18px;
    }
    .search button {
      border: 0;
      min-width: 54px;
      background: var(--orange);
      color: #fff;
      cursor: pointer;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .icon-btn {
      height: 40px;
      min-width: 40px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-weight: 800;
      display: inline-grid;
      place-items: center;
      padding: 0 12px;
    }

    .page {
      width: min(1760px, 100%);
      margin: 0 auto;
      padding: 16px clamp(10px, 2.4vw, 32px) 34px;
    }

    .category-bar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 2px 0 18px;
      scrollbar-width: thin;
    }
    .cat {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 800;
    }
    .cat.active, .cat:hover {
      background: var(--orange);
      color: #fff;
    }
    .sort-select {
      appearance: auto;
      outline: none;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 14px;
      margin-bottom: 14px;
    }
    .eyebrow {
      color: var(--orange);
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.14em;
      margin: 0 0 6px;
    }
    h1, h2, h3, p { margin-top: 0; }
    .section-head h1 {
      margin-bottom: 0;
      font-size: clamp(24px, 3vw, 40px);
      letter-spacing: -1px;
    }
    .count-pill {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--orange);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 15px;
    }
    .video-card {
      display: block;
      width: 100%;
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }
    .video-card:hover {
      transform: translateY(-3px);
      border-color: var(--border);
      background: var(--surface);
    }
    .thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface-2);
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb::after {
      content: "▶";
      position: absolute;
      right: 8px;
      bottom: 8px;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 122, 0, 0.94);
      color: #fff;
      font-size: 13px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
    }
    .video-title {
      margin: 9px 4px 12px;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 800;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 28px 0 6px;
    }
    .page-btn {
      min-width: 42px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-weight: 900;
      padding: 0 12px;
    }
    .page-btn.active, .page-btn:hover {
      background: var(--orange);
      color: #fff;
    }
    .page-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .empty-state {
      border: 1px dashed var(--border);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 34px;
      text-align: center;
      color: var(--muted);
    }

    .watch-page {
      min-height: calc(100vh - 74px);
    }
    .back-btn {
      margin: 2px 0 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 800;
    }
    .watch-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 24px;
    }
    .embed-box {
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .embed-box iframe { width: 100%; height: 100%; border: 0; display: block; }
    .embed-placeholder {
      height: 100%;
      display: grid;
      place-items: center;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    .watch-title {
      margin: 18px 0 10px;
      font-size: clamp(24px, 3vw, 40px);
      line-height: 1.15;
      letter-spacing: -0.8px;
    }
    .watch-category {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--orange);
      font-weight: 900;
      background: color-mix(in srgb, var(--orange) 12%, var(--surface));
    }
    .watch-desc { color: var(--muted); line-height: 1.7; margin-top: 12px; }
    .side-panel {
      align-self: start;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 14px;
    }
    .related-list { display: grid; gap: 8px; }
    .related-item {
      display: grid;
      grid-template-columns: 118px 1fr;
      gap: 10px;
      align-items: center;
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      border-radius: 12px;
      padding: 8px;
      cursor: pointer;
    }
    .related-item:hover { background: var(--surface-2); }
    .related-item img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 10px; }
    .related-item h4 { margin: 0; font-size: 13px; line-height: 1.35; }

    .sponsor-section {
      width: min(1760px, 100%);
      margin: 0 auto;
      padding: 12px clamp(10px, 2.4vw, 32px) 20px;
    }
    .sponsor-card {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 18px;
      padding: 14px;
    }
    .sponsor-card p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .sponsor-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .sponsor-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 9px 13px;
      background: var(--surface-2);
      color: var(--text);
      text-decoration: none;
      font-weight: 800;
      font-size: 13px;
    }
    .sponsor-links a:hover { background: var(--orange); color: #fff; }

    .footer {
      border-top: 1px solid var(--border);
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
    }


    .footer-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 12px;
    }
    .footer-nav a {
      color: var(--text);
      text-decoration: none;
      font-weight: 900;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .footer-nav a:hover {
      background: var(--orange);
      color: #fff;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.68);
      padding: 14px;
    }
    .modal-card {
      width: min(980px, 100%);
      max-height: 92vh;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      color: var(--text);
      padding: 22px;
      box-shadow: var(--shadow);
    }
    .small-modal { width: min(460px, 100%); }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 16px;
    }
    .modal-head h2 { margin: 0; }
    .notice {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: color-mix(in srgb, var(--orange) 12%, var(--surface-2));
      color: var(--muted);
      line-height: 1.45;
      font-weight: 700;
    }
    label { display: grid; gap: 7px; color: var(--muted); font-weight: 800; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface-2);
      color: var(--text);
      padding: 11px 13px;
      outline: none;
    }
    textarea { resize: vertical; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 18px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-weight: 900;
      text-decoration: none;
    }
    .btn.primary { background: var(--orange); border-color: var(--orange); color: #fff; }
    .btn.ghost { background: transparent; }
    .btn.danger { background: #d93030; border-color: #d93030; color: #fff; }
    .btn.full { width: 100%; }
    .modal-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .import-label { position: relative; overflow: hidden; }
    .form-preview {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 12px;
      align-items: center;
      border: 1px dashed var(--border);
      border-radius: 16px;
      padding: 12px;
      color: var(--muted);
      font-weight: 800;
    }
    .form-preview img {
      width: 180px;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 12px;
      background: var(--surface-2);
    }

    @media (max-width: 980px) {
      .topbar { grid-template-columns: 1fr auto; }
      .search { grid-column: 1 / -1; grid-row: 2; width: 100%; }
      .watch-layout { grid-template-columns: 1fr; }
      .side-panel { display: none; }
      .video-grid { grid-template-columns: 1fr; gap: 12px; }
      .video-card {
        display: block;
        padding: 8px;
        border-color: var(--border);
        background: var(--surface);
      }
      .video-title { margin: 10px 4px 6px; font-size: 15px; -webkit-line-clamp: 2; }
      .thumb { border-radius: 12px; width: 100%; }
      .two-col, .form-preview { grid-template-columns: 1fr; }
      .form-preview img { width: 100%; }
    }
    @media (max-width: 560px) {
      .brand span:last-child { display: none; }
      .topbar { gap: 8px; }
      .icon-btn { min-width: 38px; height: 38px; padding: 0 10px; }
      .section-head { align-items: center; }
      .modal-card { padding: 16px; border-radius: 18px; }
    }


    /* ===== Mobile/Desktop layout fixes requested ===== */
    /* Desktop: YouTube-style responsive movie card grid */
    @media (min-width: 981px) {
      .video-grid {
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 22px 16px;
      }
      .video-card {
        border: 0;
        background: transparent;
        border-radius: 12px;
        overflow: visible;
      }
      .video-card:hover {
        border-color: transparent;
        background: transparent;
        transform: translateY(-2px);
      }
      .thumb {
        border: 0;
        border-radius: 12px;
      }
      .video-title {
        margin: 10px 2px 0;
        font-size: 14px;
        line-height: 1.35;
      }
    }

    /* Phone/tablet: make thumbnails full-width and remove orange thumbnail border */
    @media (max-width: 980px) {
      .page {
        padding-left: 14px;
        padding-right: 14px;
      }
      .video-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }
      .video-card {
        padding: 0;
        border: 1px solid rgba(255, 122, 0, 0.28);
        border-radius: 16px;
        background: var(--surface);
        overflow: hidden;
      }
      .thumb {
        width: 100%;
        aspect-ratio: 16 / 9;
        border: 0 !important;
        border-radius: 14px 14px 0 0;
      }
      .thumb::after {
        right: 10px;
        bottom: 10px;
      }
      .video-title {
        margin: 10px 16px 16px;
        font-size: 16px;
      }
    }

    /* Show website name on phones too */
    @media (max-width: 560px) {
      .brand span:last-child { display: inline !important; }
      .brand {
        font-size: 18px;
        gap: 7px;
        letter-spacing: -0.5px;
      }
      .brand-icon {
        width: 38px;
        height: 38px;
        border-radius: 11px;
      }
      .topbar {
        grid-template-columns: minmax(0, 1fr) auto;
      }
    }
  </style>
</head>
<body>
  <noscript>This website requires JavaScript to work.</noscript>

  <header class="topbar">
    <a class="brand" href="#home" aria-label="movieXnow home">
      <span class="brand-icon">▶</span>
      <span>movie<strong>X</strong>now</span>
    </a>

    <form id="searchForm" class="search" role="search">
      <input id="searchInput" type="search" placeholder="Search movies..." autocomplete="off" aria-label="Search movies" />
      <button type="submit" aria-label="Search">🔍</button>
    </form>

    <div class="header-actions">
      <button id="themeToggle" class="icon-btn" type="button" aria-label="Switch light or dark mode">☀️</button>
    </div>
  </header>

  <main id="homePage" class="page">
    <nav class="category-bar" aria-label="Movie categories">
      <select id="sortMode" class="cat sort-select" aria-label="Video order">
        <option value="new" selected>New</option>
        <option value="random">Random</option>
        <option value="last">Last</option>
      </select>
      <button class="cat" type="button" data-category="Sri Lanka">Sri Lanka</button>
      <button class="cat" type="button" data-category="India">India</button>
      <button class="cat" type="button" data-category="18+">18+</button>
      <button class="cat" type="button" data-category="new">new</button>
    </nav>

    <section class="section-head">
      <div>
        <p class="eyebrow">New Releases / Latest Videos</p>
        <h1 id="gridTitle">Latest Videos</h1>
      </div>
    </section>

    <section id="videoGrid" class="video-grid" aria-live="polite"></section>
    <section id="emptyState" class="empty-state hidden">
      <h2>No videos found</h2>
      <p></p>
    </section>
    <nav id="pagination" class="pagination" aria-label="Video pages"></nav>
  </main>

  <section id="watchPage" class="page watch-page hidden">
    <button id="backBtn" class="back-btn" type="button">← Back to movies</button>
    <div class="watch-layout">
      <article>
        <div id="embedBox" class="embed-box"></div>
        <h1 id="watchTitle" class="watch-title"></h1>
        <span id="watchCategory" class="watch-category"></span>
        <p id="watchDesc" class="watch-desc"></p>
      </article>
      <aside class="side-panel">
        <h3>Latest Videos</h3>
        <div id="relatedList" class="related-list"></div>
      </aside>
    </div>
  </section>

  <section class="sponsor-section" aria-label="MovieXnow links">
    <div class="sponsor-card">
      <p>MovieXnow</p>
      <div class="sponsor-links" id="sponsorLinks"></div>
    </div>
  </section>

  <div id="adPopupModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="adPopupTitle">
    <div class="modal-card small-modal">
      <h2 id="adPopupTitle">video loading please wait...</h2>
      <div class="modal-actions">
        <button id="adPopupOk" class="btn primary" type="button">OK</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <nav class="footer-nav" id="footerNav">
      <a href="#" data-link="https://omg10.com/4/10447395">Home</a>
      <a href="#" data-link="https://omg10.com/4/10447395">Contact Us</a>
      <a href="#" data-link="https://omg10.com/4/10443158">Terms and Condition</a>
    </nav>
    <div>copyright by MovieXnow</div>
  </footer>

  <script>
    /*
      movieXnow GitHub Pages template
      Movies are loaded from a published Google Sheet CSV.
    */
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTadn1E0QSyLy2YGv3HAqznOYmTx3hJHqQrgeit8iEmomPhJ6HZNMiY3mpohspLi9k3AI_CUC3NfkKT/pub?output=csv";
    const THEME_KEY = "moviexnow.theme";
    const PER_PAGE = 10;

    const FIRST_CLICK_AD_URL = "https://omg10.com/4/10443175";
    const POPUP_AD_URL = "https://omg10.com/4/10447395";
    const POPUP_INTERVAL_MS = 300000;

    const fallbackThumb = svgThumb("movieXnow", "#ff7a00", "#111111");

    const sponsorItems = [
      ["New Movie", "https://omg10.com/4/10443158"],
      ["18+", "https://omg10.com/4/10443155"],
      ["Trending", "https://omg10.com/4/10443312"],
      ["Bollywood", "https://omg10.com/4/10447395"],
      ["Hollywood", "https://omg10.com/4/11259619"],
      ["TV Serials", "https://omg10.com/4/10443175"],
      ["Drama", "https://omg10.com/4/10443158"],
      ["Tamil Movies", "https://omg10.com/4/10447395"],
      ["PC Game", "https://omg10.com/4/10443158"],
      ["Punjab Movie", "https://omg10.com/4/10443158"]
    ];

    let videos = [];
    let currentCategory = "All";
    let currentQuery = "";
    let currentPage = 1;
    let currentSort = "new";
    let randomRank = new Map();

    const $ = (id) => document.getElementById(id);

    init();

    function init() {
      document.documentElement.dataset.theme = localStorage.getItem(THEME_KEY) || "dark";
      updateThemeButton();
      renderSponsorLinks();

      $("searchForm").addEventListener("submit", (event) => {
        event.preventDefault();
        currentQuery = $("searchInput").value.trim().toLowerCase();
        currentPage = 1;
        renderGrid();
      });

      $("searchInput").addEventListener("input", () => {
        currentQuery = $("searchInput").value.trim().toLowerCase();
        currentPage = 1;
        renderGrid();
      });

      document.querySelectorAll("button.cat").forEach((button) => {
        button.addEventListener("click", () => {
          const category = button.dataset.category;
          setCategory(category);
        });
      });

      $("sortMode").addEventListener("change", () => {
        currentSort = $("sortMode").value;
        currentCategory = "All";
        currentPage = 1;
        if (currentSort === "random") buildRandomRank();
        document.querySelectorAll("button.cat").forEach((btn) => btn.classList.remove("active"));
        renderGrid();
      });

      document.querySelector(".brand").addEventListener("click", (event) => {
        event.preventDefault();
        $("searchInput").value = "";
        currentQuery = "";
        currentSort = "new";
        $("sortMode").value = "new";
        setCategory("All");
        showHome();
      });

      $("themeToggle").addEventListener("click", toggleTheme);
      $("backBtn").addEventListener("click", showHome);

      initAdMergeFeatures();
      loadMoviesFromSheet();
    }

    function initAdMergeFeatures() {
      let firstClickDone = false;

      document.addEventListener("click", () => {
        if (firstClickDone) return;
        firstClickDone = true;
        window.open(FIRST_CLICK_AD_URL, "_blank", "noopener");
      }, { capture: true });

      setInterval(() => {
        $("adPopupModal").classList.remove("hidden");
      }, POPUP_INTERVAL_MS);

      $("adPopupOk").addEventListener("click", (event) => {
        event.preventDefault();
        $("adPopupModal").classList.add("hidden");
        window.open(POPUP_AD_URL, "_blank", "noopener");
      });

      document.querySelectorAll(".footer-nav a").forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          const url = link.dataset.link;
          if (url) window.open(url, "_blank", "noopener");
        });
      });
    }

    async function loadMoviesFromSheet() {
      $("emptyState").classList.add("hidden");
      try {
        const response = await fetch(withCacheBust(SHEET_CSV_URL), { cache: "no-store" });
        if (!response.ok) throw new Error("Google Sheet CSV request failed.");
        const csvText = await response.text();
        videos = csvToVideos(csvText);
        if (currentSort === "random") buildRandomRank();
        currentPage = 1;
        renderGrid();
      } catch (error) {
        videos = [];
        renderGrid();
        $("emptyState").classList.remove("hidden");
        $("emptyState").innerHTML = "<h2>Movies could not be loaded</h2><p></p>";
      }
    }

    function withCacheBust(url) {
      const separator = url.includes("?") ? "&" : "?";
      return `${url}${separator}cacheBust=${Date.now()}`;
    }

    function csvToVideos(csvText) {
      const rows = parseCsv(csvText).filter((row) => row.some((cell) => String(cell).trim() !== ""));
      if (rows.length < 2) return [];

      const headers = rows[0].map((header) => normalizeHeader(header));
      const titleIndex = headers.indexOf("title");
      const categoryIndex = headers.indexOf("category");
      const thumbnailIndex = headers.indexOf("thumbnail");
      const embedIndex = headers.indexOf("embed");
      const descriptionIndex = headers.indexOf("description");

      return rows.slice(1).map((row, index) => {
        const title = cell(row, titleIndex).trim();
        const category = normalizeCategory(cell(row, categoryIndex));
        const thumbnail = cell(row, thumbnailIndex).trim();
        const embed = cell(row, embedIndex).trim();
        const description = cell(row, descriptionIndex).trim();

        return {
          id: `sheet-${index + 1}-${slugify(title || "movie")}`,
          title,
          category,
          thumbnail,
          embed,
          description,
          rowIndex: index
        };
      }).filter((video) => video.title && video.thumbnail && video.embed);
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (insideQuotes && next === '"') {
            value += '"';
            i++;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (char === "," && !insideQuotes) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(value);
          rows.push(row);
          row = [];
          value = "";
        } else {
          value += char;
        }
      }

      row.push(value);
      rows.push(row);
      return rows;
    }

    function normalizeHeader(value) {
      return String(value || "").trim().toLowerCase();
    }

    function normalizeCategory(value) {
      const raw = String(value || "").trim();
      const key = raw.toLowerCase();

      if (key === "sri lanka" || key === "srilanka" || key === "sl") return "Sri Lanka";
      if (key === "india" || key === "indian") return "India";
      if (key === "18+" || key === "adult") return "18+";
      if (key === "new" || key === "latest") return "new";

      return raw || "new";
    }

    function cell(row, index) {
      if (index < 0 || index >= row.length) return "";
      return String(row[index] || "");
    }

    function setCategory(category) {
      currentCategory = category;
      currentPage = 1;
      document.querySelectorAll("button.cat").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.category === category);
      });
      renderGrid();
    }

    function filteredVideos() {
      return applyCurrentSort(videos
        .slice()
        .filter((video) => currentCategory === "All" || video.category === currentCategory)
        .filter((video) => {
          if (!currentQuery) return true;
          return [video.title, video.category, video.description].join(" ").toLowerCase().includes(currentQuery);
        }));
    }

    function applyCurrentSort(list) {
      if (currentSort === "random") {
        if (!randomRank.size) buildRandomRank();
        return list.sort((a, b) => (randomRank.get(a.id) ?? 0) - (randomRank.get(b.id) ?? 0));
      }

      if (currentSort === "last") {
        return list.sort((a, b) => a.rowIndex - b.rowIndex);
      }

      return list.sort((a, b) => b.rowIndex - a.rowIndex);
    }

    function buildRandomRank() {
      const ids = videos.map((video) => video.id);
      for (let i = ids.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [ids[i], ids[j]] = [ids[j], ids[i]];
      }
      randomRank = new Map(ids.map((id, index) => [id, index]));
    }

    function renderGrid() {
      const list = filteredVideos();
      const totalPages = Math.max(1, Math.ceil(list.length / PER_PAGE));
      if (currentPage > totalPages) currentPage = totalPages;
      const pageList = list.slice((currentPage - 1) * PER_PAGE, currentPage * PER_PAGE);

      $("gridTitle").textContent = currentQuery ? `Search: ${$("searchInput").value}` : (currentCategory === "All" ? "Latest Videos" : currentCategory);
      $("videoGrid").innerHTML = "";
      $("emptyState").classList.toggle("hidden", list.length > 0);

      pageList.forEach((video) => {
        const card = document.createElement("button");
        card.className = "video-card";
        card.type = "button";
        card.innerHTML = `
          <div class="thumb"><img src="${escapeAttr(video.thumbnail)}" alt="${escapeAttr(video.title)} thumbnail" loading="lazy"></div>
          <h3 class="video-title">${escapeHtml(video.description || "")}</h3>
        `;
        card.addEventListener("click", () => openVideo(video.id));
        $("videoGrid").appendChild(card);
      });

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const nav = $("pagination");
      nav.innerHTML = "";
      if (totalPages <= 1) return;

      const addButton = (label, page, disabled = false, active = false) => {
        const btn = document.createElement("button");
        btn.className = `page-btn${active ? " active" : ""}`;
        btn.type = "button";
        btn.textContent = label;
        btn.disabled = disabled;
        btn.addEventListener("click", () => {
          if (disabled || page === currentPage) return;
          currentPage = page;
          renderGrid();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        nav.appendChild(btn);
      };

      const addDots = () => {
        const dots = document.createElement("span");
        dots.className = "page-btn";
        dots.textContent = "...";
        dots.style.pointerEvents = "none";
        dots.style.display = "inline-flex";
        dots.style.alignItems = "center";
        dots.style.justifyContent = "center";
        nav.appendChild(dots);
      };

      addButton("Previous", Math.max(1, currentPage - 1), currentPage === 1);

      const pages = [];
      pages.push(1);
      for (let page = currentPage - 1; page <= currentPage + 1; page++) {
        if (page > 1 && page < totalPages) pages.push(page);
      }
      if (totalPages > 1) pages.push(totalPages);

      const uniquePages = [...new Set(pages)].sort((a, b) => a - b);
      uniquePages.forEach((page, index) => {
        if (index > 0 && page - uniquePages[index - 1] > 1) addDots();
        addButton(String(page), page, false, page === currentPage);
      });

      addButton("Next Page", Math.min(totalPages, currentPage + 1), currentPage === totalPages);
    }

    function openVideo(id) {
      const video = videos.find((item) => item.id === id);
      if (!video) return;
      $("homePage").classList.add("hidden");
      $("watchPage").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
      $("watchTitle").textContent = video.description || "";
      $("watchCategory").textContent = video.category;
      $("watchDesc").textContent = video.description || "No description added.";
      renderEmbed(video.embed);
      renderRelated(id);
    }

    function showHome() {
      $("watchPage").classList.add("hidden");
      $("homePage").classList.remove("hidden");
      $("embedBox").innerHTML = "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderEmbed(embedInput) {
      const src = extractEmbedSrc(embedInput);
      if (!src) {
        $("embedBox").innerHTML = `<div class="embed-placeholder">Invalid embed link. Add a valid DoodStream embed URL or iframe code.</div>`;
        return;
      }
      $("embedBox").innerHTML = `<iframe src="${escapeAttr(src)}" allowfullscreen scrolling="no" allow="autoplay; fullscreen; picture-in-picture" referrerpolicy="no-referrer"></iframe>`;
    }

    function extractEmbedSrc(input = "") {
      const value = input.trim();
      if (!value) return "";
      const iframeSrc = value.match(/src=["']([^"']+)["']/i);
      if (iframeSrc && iframeSrc[1]) return iframeSrc[1];
      return value;
    }

    function renderRelated(currentId) {
      const related = applyCurrentSort(videos.filter((video) => video.id !== currentId)).slice(0, 8);
      $("relatedList").innerHTML = "";
      related.forEach((video) => {
        const item = document.createElement("button");
        item.className = "related-item";
        item.type = "button";
        item.innerHTML = `<img src="${escapeAttr(video.thumbnail || fallbackThumb)}" alt="${escapeAttr(video.title)} thumbnail"><h4>${escapeHtml(video.description || "")}</h4>`;
        item.addEventListener("click", () => openVideo(video.id));
        $("relatedList").appendChild(item);
      });
    }

    function toggleTheme() {
      const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = next;
      localStorage.setItem(THEME_KEY, next);
      updateThemeButton();
    }

    function updateThemeButton() {
      $("themeToggle").textContent = document.documentElement.dataset.theme === "dark" ? "☀️" : "🌙";
    }

    function renderSponsorLinks() {
      const wrap = $("sponsorLinks");
      sponsorItems.forEach(([label, url]) => {
        const a = document.createElement("a");
        a.href = url;
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = label;
        wrap.appendChild(a);
      });
    }

    function slugify(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 48) || "movie";
    }

    function escapeHtml(value = "") {
      return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function escapeAttr(value = "") {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    function svgThumb(text, color, bg) {
      const safeText = String(text).replace(/[<>&]/g, "").slice(0, 30);
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='1280' height='720' viewBox='0 0 1280 720'>
        <defs><linearGradient id='g' x1='0' x2='1'><stop stop-color='${bg}'/><stop offset='1' stop-color='#000'/></linearGradient></defs>
        <rect width='1280' height='720' fill='url(#g)'/>
        <rect x='44' y='44' width='1192' height='632' rx='42' fill='none' stroke='${color}' stroke-width='9' opacity='.75'/>
        <circle cx='640' cy='340' r='112' fill='${color}' opacity='.96'/>
        <polygon points='615,280 615,400 720,340' fill='white'/>
        <text x='640' y='555' text-anchor='middle' fill='white' font-family='Arial, sans-serif' font-size='62' font-weight='900'>${safeText}</text>
        <text x='640' y='620' text-anchor='middle' fill='${color}' font-family='Arial, sans-serif' font-size='34' font-weight='900'>movieXnow</text>
      </svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }
  </script>
</body>
